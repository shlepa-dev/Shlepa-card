<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Shlepa Card</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23E67E22'>💳</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23E67E22'>💳</text></svg>">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #F8F6F2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px 16px 32px; color: #2C2C2C; }
        .app { max-width: 500px; margin: 0 auto; }
        .header { margin-bottom: 28px; text-align: center; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .logo-icon { font-size: 34px; }
        .logo-img { width: 42px; height: 42px; border-radius: 42px; object-fit: cover; }
        .logo-text { font-size: 26px; font-weight: 700; color: #E67E22; letter-spacing: -0.3px; }
        .tagline { font-size: 12px; color: #9B8E7C; letter-spacing: 0.3px; margin-bottom: 8px; }
        .slogan { font-size: 14px; color: #B8956E; font-weight: 400; font-style: italic; }
        .lang-switch { position: absolute; top: 20px; right: 20px; background: #E67E22; color: white; border: none; padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; z-index: 100; }
        @media (max-width: 550px) { .lang-switch { top: 16px; right: 16px; padding: 6px 12px; font-size: 12px; } }
        .form-card { background: white; border-radius: 28px; padding: 20px; margin-bottom: 28px; border: 1px solid #EFE8DF; }
        .field { margin-bottom: 14px; }
        .field label { font-size: 13px; font-weight: 500; color: #7F6E5D; display: block; margin-bottom: 6px; }
        .field input, .field textarea { width: 100%; padding: 12px 15px; font-size: 15px; border: 1px solid #E5DDD2; border-radius: 24px; background: #FFFFFF; font-family: inherit; }
        .field input:focus, .field textarea:focus { outline: none; border-color: #E67E22; box-shadow: 0 0 0 3px rgba(230,126,34,0.08); }
        textarea { resize: vertical; }
        .btn-primary { background: #E67E22; color: white; border: none; padding: 13px 18px; border-radius: 40px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; margin-top: 8px; }
        .btn-primary:active { background: #D35400; transform: scale(0.97); }
        .btn-secondary { background: #F1EDE8; border: none; padding: 10px 16px; border-radius: 40px; font-weight: 500; font-size: 14px; color: #E67E22; cursor: pointer; }
        .btn-small { background: #E67E22; border: none; padding: 6px 14px; border-radius: 30px; font-size: 12px; color: white; cursor: pointer; }
        .row-buttons { display: flex; gap: 12px; margin: 12px 0; }
        .camera-box { background: #E8E3DA; border-radius: 24px; overflow: hidden; margin-top: 10px; }
        video { width: 100%; display: block; max-height: 220px; }
        .scan-result { background: #F4F0EA; padding: 10px 14px; border-radius: 22px; margin-top: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .scanned-number { font-family: monospace; font-size: 14px; font-weight: 500; margin-top: 6px; word-break: break-all; }
        .photo-preview { margin: 10px 0; border-radius: 20px; overflow: hidden; background: #F4F0EA; position: relative; }
        .photo-preview img { width: 100%; display: block; max-height: 140px; object-fit: cover; }
        .remove-photo { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 30px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
        .section-title { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
        .section-title h2 { font-size: 20px; font-weight: 600; color: #3A3A3A; }
        .badge-count { background: #E8E3DA; padding: 3px 12px; border-radius: 30px; font-size: 12px; color: #7F6E5D; }
        .cards-list { display: flex; flex-direction: column; gap: 14px; }
        .card { background: white; border-radius: 24px; border: 1px solid #EFE8DF; overflow: hidden; }
        .card-inner { padding: 18px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-name { font-size: 18px; font-weight: 600; color: #2C2C2C; }
        .card-type { background: #F4F0EA; padding: 4px 10px; border-radius: 30px; font-size: 10px; font-weight: 500; color: #E67E22; }
        .card-number { font-family: monospace; background: #F8F6F2; padding: 10px 12px; border-radius: 18px; border: 1px dashed #E5DDD2; font-size: 13px; margin: 10px 0; word-break: break-all; color: #4A4A4A; }
        .card-photo { margin: 10px 0; border-radius: 18px; overflow: hidden; cursor: pointer; }
        .card-photo img { width: 100%; display: block; max-height: 130px; object-fit: cover; }
        .barcode-tap { background: #F8F6F2; padding: 10px; border-radius: 18px; text-align: center; border: 1px solid #EFE8DF; cursor: pointer; margin: 10px 0; }
        .barcode-tap svg { max-width: 100%; height: auto; }
        .card-note { font-size: 12px; color: #9B8E7C; background: #F8F6F2; padding: 8px 12px; border-radius: 18px; border-left: 3px solid #E67E22; margin: 8px 0; }
        .card-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #EFE8DF; }
        .action-btn { background: none; border: none; padding: 6px 12px; border-radius: 30px; font-size: 13px; color: #7F6E5D; cursor: pointer; }
        .delete-btn { color: #C26B54; }
        .empty-state { background: white; border-radius: 28px; padding: 48px 24px; text-align: center; color: #B8956E; border: 1px solid #EFE8DF; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-box { background: white; width: 85%; max-width: 340px; border-radius: 44px; padding: 24px 20px; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 12px 15px; border-radius: 28px; border: 1px solid #E5DDD2; margin: 8px 0; font-size: 15px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .fullscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .fullscreen.active { visibility: visible; opacity: 1; }
        .fullscreen svg { width: 85%; background: white; padding: 20px; border-radius: 32px; }
        .fullscreen img { max-width: 90%; max-height: 75%; border-radius: 24px; background: white; padding: 10px; }
        .close-fs { margin-top: 30px; background: #E67E22; color: white; border: none; padding: 10px 28px; border-radius: 50px; font-size: 15px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2C2C2C; color: #FFA559; padding: 8px 20px; border-radius: 50px; font-size: 13px; z-index: 3000; opacity: 0; transition: 0.2s; pointer-events: none; }
        .camera-photo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1500; display: flex; flex-direction: column; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; }
        .camera-photo.active { visibility: visible; opacity: 1; }
        .camera-photo video { width: 100%; max-height: 70vh; object-fit: cover; }
        .cam-controls { display: flex; gap: 30px; margin-top: 30px; }
        .shutter-btn { background: #FFA559; width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; cursor: pointer; }
        .cancel-cam { background: #2C2C2C; border: none; padding: 12px 28px; border-radius: 50px; font-size: 16px; color: white; cursor: pointer; }
    </style>
</head>
<body>
<button class="lang-switch" id="langToggle">English</button>

<div class="app">
    <div class="header">
        <div class="logo-row" id="logoContainer">
            <span class="logo-icon">💳</span>
            <span class="logo-text">Shlepa Card</span>
        </div>
        <div class="tagline" id="taglineText">система сохранения карт лояльности</div>
        <div class="slogan" id="sloganText">твои карты всегда с тобой</div>
    </div>

    <div class="form-card">
        <div class="field"><label id="storeLabel">Магазин</label><input type="text" id="shopName" placeholder="Пример: Мелодия Здоровья"></div>
        <div class="field"><label id="numberLabel">Номер карты</label><input type="text" id="cardNumber" placeholder="Введите или отсканируйте"></div>
        <div class="field"><label id="photoLabel">Фото карты</label><button type="button" class="btn-secondary" id="openPhotoBtn" style="width:100%;">📷 Сделать фото</button>
            <div id="photoPreview" style="display:none;" class="photo-preview"><img id="photoImg" alt="Фото"><button id="removePhoto" class="remove-photo">✖️ Удалить</button></div>
        </div>
        <div class="field"><label id="noteLabel">Заметка</label><textarea id="note" rows="2" placeholder="Бонусы, срок действия..."></textarea></div>
        <div class="row-buttons"><button class="btn-secondary" id="startScan" style="flex:1;">📷 Сканировать</button><button class="btn-secondary" id="stopScan" style="display:none; flex:1;">⏹️ Закрыть</button></div>
        <div id="cameraBlock" style="display:none;" class="camera-box"><video id="scanVideo" autoplay playsinline muted></video></div>
        <div id="scanRes" style="display:none;" class="scan-result"><div class="flex-between"><span id="scannedLabel">✅ Отсканировано:</span><button id="applyScan" class="btn-small">Вставить</button></div><div id="scannedText" class="scanned-number">—</div></div>
        <button class="btn-primary" id="addCard">➕ Добавить карту</button>
    </div>

    <div class="section-title"><h2 id="myCardsTitle">Мои карты</h2><span class="badge-count" id="cardsCount">0</span></div>
    <div id="cardsList" class="cards-list"></div>
</div>

<div id="editModal" class="modal-overlay"><div class="modal-box"><h3 style="margin-bottom:12px;" id="editTitle">Редактировать</h3><input type="text" id="editName" placeholder="Название"><input type="text"id="editNumber" placeholder="Номер"><textarea id="editNote" rows="2" placeholder="Заметка"></textarea><div class="modal-actions"><button class="btn-secondary" id="cancelEdit">Отмена</button><button class="btn-primary" id="saveEdit" style="margin:0;">Сохранить</button></div></div></div>

<div id="fullscreenModal" class="fullscreen"><div id="fsContent"></div><button class="close-fs" id="closeFs">✖️ Закрыть</button></div>
<div id="photoCamera" class="camera-photo"><video id="photoVideo" autoplay playsinline muted></video><div class="cam-controls"><button class="shutter-btn" id="shutterBtn"></button><button class="cancel-cam" id="cancelCamBtn">Отмена</button></div></div>
<div id="toastMsg" class="toast">✅ Готово</div>

<script>
    const lang = {
        ru: {
            tagline: "система сохранения карт лояльности", slogan: "твои карты всегда с тобой",
            store: "Магазин", storePlaceholder: "Пример: Мелодия Здоровья",
            number: "Номер карты", numberPlaceholder: "Введите или отсканируйте",
            photo: "Фото карты", photoBtn: "📷 Сделать фото",
            note: "Заметка", notePlaceholder: "Бонусы, срок действия...",
            scanBtn: "📷 Сканировать", stopScan: "⏹️ Закрыть", scanned: "✅ Отсканировано:", apply: "Вставить",
            addBtn: "➕ Добавить карту", myCards: "Мои карты", edit: "Редактировать", cancel: "Отмена", save: "Сохранить",
            empty: "✨ Нет карт. Добавьте первую", deleteConfirm: "Удалить карту?", photoAdded: "📸 Фото добавлено", done: "✅ Готово",
            removePhoto: "Удалить", close: "✖️ Закрыть", cancelPhoto: "Отмена"
        },
        en: {
            tagline: "loyalty cards storage system", slogan: "your cards are always with you",
            store: "Store", storePlaceholder: "Example: Target, Walmart, CVS",
            number: "Card number", numberPlaceholder: "Enter or scan",
            photo: "Card photo", photoBtn: "📷 Take photo",
            note: "Note", notePlaceholder: "Bonuses, expiration date...",
            scanBtn: "📷 Scan barcode", stopScan: "⏹️ Close", scanned: "✅ Scanned:", apply: "Insert",
            addBtn: "➕ Add card", myCards: "My cards", edit: "Edit", cancel: "Cancel", save: "Save",
            empty: "✨ No cards. Add your first one", deleteConfirm: "Delete card?", photoAdded: "📸 Photo added", done: "✅ Done",
            removePhoto: "Remove", close: "✖️ Close", cancelPhoto: "Cancel"
        }
    };
    
    let currentLang = 'ru';
    
    function updateUILanguage() {
        const t = lang[currentLang];
        document.getElementById('taglineText').innerText = t.tagline;
        document.getElementById('sloganText').innerText = t.slogan;
        document.getElementById('storeLabel').innerText = t.store;
        document.getElementById('numberLabel').innerText = t.number;
        document.getElementById('photoLabel').innerText = t.photo;
        document.getElementById('openPhotoBtn').innerHTML = t.photoBtn;
        document.getElementById('noteLabel').innerText = t.note;
        document.getElementById('startScan').innerHTML = t.scanBtn;
        document.getElementById('stopScan').innerHTML = t.stopScan;
        document.getElementById('scannedLabel').innerHTML = t.scanned;
        document.getElementById('applyScan').innerHTML = t.apply;
        document.getElementById('addCard').innerHTML = t.addBtn;
        document.getElementById('myCardsTitle').innerText = t.myCards;
        document.getElementById('editTitle').innerText = t.edit;
        document.getElementById('cancelEdit').innerText = t.cancel;
        document.getElementById('saveEdit').innerText = t.save;
        document.getElementById('langToggle').innerText = currentLang === 'ru' ? 'English' : 'Русский';
        document.getElementById('shopName').placeholder = t.storePlaceholder;
        document.getElementById('cardNumber').placeholder = t.numberPlaceholder;
        document.getElementById('note').placeholder = t.notePlaceholder;
        document.getElementById('editName').placeholder = t.store;
        document.getElementById('editNumber').placeholder = t.number;
        document.getElementById('editNote').placeholder = t.notePlaceholder;
        document.getElementById('removePhoto').innerHTML = `✖️ ${t.removePhoto}`;
        document.getElementById('closeFs').innerHTML = t.close;
        document.getElementById('cancelCamBtn').innerHTML = t.cancelPhoto;
        renderCards();
    }
    
    document.getElementById('langToggle').addEventListener('click', () => {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        updateUILanguage();
    });
    
    const STORAGE_KEY = 'shlepa_light';
    let cards = [];
    const shopInput = document.getElementById('shopName');
    const numberInput = document.getElementById('cardNumber');
    const noteArea = document.getElementById('note');
    const addBtn = document.getElementById('addCard');
    const cardsContainer = document.getElementById('cardsList');
    const cardsCountSpan = document.getElementById('cardsCount');
    
    const openPhotoBtn = document.getElementById('openPhotoBtn');
    const photoCameraDiv = document.getElementById('photoCamera');
    const photoVideo = document.getElementById('photoVideo');
    const shutter = document.getElementById('shutterBtn');
    const cancelCam = document.getElementById('cancelCamBtn');
    const photoPreviewDiv = document.getElementById('photoPreview');
    const photoImg = document.getElementById('photoImg');
    const removePhotoBtn = document.getElementById('removePhoto');
    let photoStream = null;
    let currentPhoto = null;
    
    const editModal = document.getElementById('editModal');
    const editName = document.getElementById('editName');
    const editNumber = document.getElementById('editNumber');
    const editNote = document.getElementById('editNote');
    const cancelEdit = document.getElementById('cancelEdit');
    const saveEdit = document.getElementById('saveEdit');
    let editId = null;
    
    const fsDiv = document.getElementById('fullscreenModal');
    const fsContent = document.getElementById('fsContent');
    const closeFs = document.getElementById('closeFs');
    const toast = document.getElementById('toastMsg');
    
    function showToast(msg) { toast.innerText = msg; toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 1800); }
    
    function getFormat(code) {
        let clean = code.toString().replace(/\D/g, '');
        if (clean.length === 8) return { name: "EAN-8", js: "ean8" };
        if (clean.length === 12) return { name: "UPC", js: "upc" };
        if (clean.length === 13) return { name: "EAN-13", js: "ean13" };
        return { name: "CODE128", js: "code128" };
    }
    
    function renderBarcode(containerId, code, type) {
        let el = document.getElementById(containerId);
        if (!el) return;
        el.innerHTML = '';
        try { JsBarcode(el, code.toString(), { format: type, width: 2, height: 45, displayValue: true, fontSize: 12, margin: 4, background: "#fff", lineColor: "#2C2C2C" }); } catch(e) {}
    }
    
    function showFullscreenPhoto(photoData) {
        fsContent.innerHTML = '';
        let img = document.createElement('img');
        img.src = photoData;
        fsContent.appendChild(img);
        fsDiv.classList.add('active');
    }
    
    function showFullscreenBarcode(number, type) {
        fsContent.innerHTML = '';
        let wrap = document.createElement('div');
        wrap.style.background = 'white';
        wrap.style.padding = '20px';
        wrap.style.borderRadius = '28px';
        let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("id", "fs_svg");
        wrap.appendChild(svg);
        fsContent.appendChild(wrap);
        try { JsBarcode("#fs_svg", number.toString(), { format: type, width: 3, height: 100, displayValue: true, fontSize: 18, margin: 15, background: "#fff", lineColor: "#2C2C2C" }); fsDiv.classList.add('active'); } catch(e) {}
    }
    
    closeFs.onclick = () => fsDiv.classList.remove('active');
    fsDiv.onclick = (e) => { if (e.target === fsDiv) fsDiv.classList.remove('active'); };
    
    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }
    
    function loadCards() {
        let stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { try { cards = JSON.parse(stored); if (!Array.isArray(cards)) cards = []; } catch(e) { cards = []; } }
        else { cards = []; }
        renderCards();
    }
    
    function renderCards() {
        const t = lang[currentLang];
        cardsCountSpan.innerText = cards.length;
        if (cards.length === 0) { cardsContainer.innerHTML = `<div class="empty-state">✨ ${t.empty}</div>`; return; }
        let html = '';
        cards.forEach(card => {
            let fmt = getFormat(card.number);
            let hasPhoto = card.photo && card.photo.startsWith('data:');
            html += `<div class="card"><div class="card-inner" id="card_${card.id}"><div class="card-header"><span class="card-name">${escapeHtml(card.name)}</span><span class="card-type">${fmt.name}</span></div><div class="card-number">${escapeHtml(card.number)}</div>${hasPhoto ? `<div class="card-photo" onclick="viewPhoto('${card.id}')"><img src="${card.photo}" loading="lazy"></div>` : ''}<div class="barcode-tap" onclick="viewBarcode('${escapeHtml(card.number)}', '${fmt.js}')"><svg id="bc_${card.id}"></svg></div>${card.note ? `<div class="card-note">📌 ${escapeHtml(card.note)}</div>` : ''}<div class="card-actions"><button class="action-btn editCard" data-id="${card.id}">✏️ ${t.edit}</button><button class="action-btn delete-btn deleteCard" data-id="${card.id}">🗑️ ${t.deleteConfirm.split('?')[0]}</button></div></div></div>`;
        });
        cardsContainer.innerHTML = html;
        cards.forEach(card => { let fmt = getFormat(card.number); renderBarcode(`bc_${card.id}`, card.number, fmt.js); });
        document.querySelectorAll('.editCard').forEach(btn => { btn.onclick = () => { let id = Number(btn.dataset.id); let card = cards.find(c => c.id === id); if (card) { editId = id; editName.value = card.name; editNumber.value = card.number; editNote.value = card.note || ''; editModal.classList.add('active'); } }; });
        document.querySelectorAll('.deleteCard').forEach(btn => { btn.onclick = () => { let id = Number(btn.dataset.id); if (confirm(t.deleteConfirm)) { cards = cards.filter(c => c.id !== id); saveToLocal(); renderCards(); } }; });
    }
    
    window.viewPhoto = (cardId) => { let card = cards.find(c => c.id == cardId); if (card && card.photo) showFullscreenPhoto(card.photo); };
    window.viewBarcode = (number, type) => { showFullscreenBarcode(number, type); };
    
    function addCard() {
        let name = shopInput.value.trim();
        let number = numberInput.value.trim();
        let note = noteArea.value.trim();
        if (!name) { alert(lang[currentLang].store); return; }
        if (!number) { alert(lang[currentLang].number); return; }
        cards.unshift({ id: Date.now() + Math.random() * 10000, name, number, note, photo: currentPhoto || null });
        saveToLocal();
        renderCards();
        shopInput.value = ''; numberInput.value = ''; noteArea.value = '';
        currentPhoto = null; photoPreviewDiv.style.display = 'none'; photoImg.src = '';
    }
    
    addBtn.onclick = addCard;
    cancelEdit.onclick = () => editModal.classList.remove('active');
    saveEdit.onclick = () => {
        if (editId) {
            let idx = cards.findIndex(c => c.id === editId);
            if (idx !== -1) {
                cards[idx].name = editName.value.trim() || "Card";
                cards[idx].number = editNumber.value.trim() || "0000";
                cards[idx].note = editNote.value.trim();
                saveToLocal(); renderCards();
            }
        }
        editModal.classList.remove('active');
    };
    
    async function openPhotoCam() {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            photoVideo.srcObject = stream; photoStream = stream; photoCameraDiv.classList.add('active');
        } catch(e) { alert("Нет доступа к камере"); }
    }
    function takePhoto() {
        let canvas = document.createElement('canvas');
        canvas.width = photoVideo.videoWidth; canvas.height = photoVideo.videoHeight;
        canvas.getContext('2d').drawImage(photoVideo, 0, 0);
        currentPhoto = canvas.toDataURL('image/jpeg', 0.85);
        photoImg.src = currentPhoto; photoPreviewDiv.style.display = 'block';
        closePhotoCam(); showToast(lang[currentLang].photoAdded);
    }
    function closePhotoCam() {
        if (photoStream) { photoStream.getTracks().forEach(t => t.stop()); photoStream = null; }
        photoVideo.srcObject = null; photoCameraDiv.classList.remove('active');
    }
    openPhotoBtn.onclick = openPhotoCam;
    shutter.onclick = takePhoto;
    cancelCam.onclick = closePhotoCam;
    removePhotoBtn.onclick = () => { currentPhoto = null; photoPreviewDiv.style.display = 'none'; photoImg.src = ''; };
    
    let scanStream = null, scanLoop = null, detector = null;
    const scanVideo = document.getElementById('scanVideo');
    const cameraBlock = document.getElementById('cameraBlock');
    const startScan = document.getElementById('startScan');
    const stopScan = document.getElementById('stopScan');
    const scanRes = document.getElementById('scanRes');
    const scannedTextSpan = document.getElementById('scannedText');
    const applyScan = document.getElementById('applyScan');
    let lastScanned = '';
    
    async function startScanner() {
        try {
            if (scanStream) stopScanner();
            let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            scanVideo.srcObject = stream; scanStream = stream;
            cameraBlock.style.display = 'block'; startScan.style.display = 'none'; stopScan.style.display = 'flex'; scanRes.style.display = 'none';
            if ('BarcodeDetector' in window) { detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e'] }); scanLoopFunc(); }
            else { alert("Сканер не поддерживается"); }
        } catch(e) { alert("Нет доступа к камере"); }
    }
    async function scanLoopFunc() {
        if (!detector || !scanVideo.videoWidth) { scanLoop = requestAnimationFrame(scanLoopFunc); return; }
        try {
            let codes = await detector.detect(scanVideo);
            if (codes.length > 0 && codes[0].rawValue !== lastScanned) {
                lastScanned = codes[0].rawValue;
                scannedTextSpan.innerText = lastScanned;
                scanRes.style.display = 'block';
                if (navigator.vibrate) navigator.vibrate(50);
                setTimeout(() => stopScanner(), 700);
                return;
            }
        } catch(e) {}
        scanLoop = requestAnimationFrame(scanLoopFunc);
    }
    function stopScanner() {
        if (scanLoop) cancelAnimationFrame(scanLoop);
        if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
        scanVideo.srcObject = null; cameraBlock.style.display = 'none';
        startScan.style.display = 'flex'; stopScan.style.display = 'none'; detector = null;
    }
    startScan.onclick = startScanner; stopScan.onclick = stopScanner;
    applyScan.onclick = () => { if (lastScanned) { numberInput.value = lastScanned; scanRes.style.display = 'none'; lastScanned = ''; } };
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    
    const logoContainer = document.getElementById('logoContainer');
    function tryLoadLogo() {
        const img = new Image();
        img.onload = function() { logoContainer.innerHTML = ''; const logoImg = document.createElement('img'); logoImg.src = 'logo.png'; logoImg.className = 'logo-img'; const textSpan = document.createElement('span'); textSpan.className = 'logo-text'; textSpan.innerText = 'Shlepa Card'; logoContainer.appendChild(logoImg); logoContainer.appendChild(textSpan); };
        img.src = 'logo.png';
    }
    tryLoadLogo();
    
    loadCards();
    updateUILanguage();
</script>
</body>
